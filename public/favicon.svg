<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- Soft green glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feFlood flood-color="#10B981" flood-opacity="0.3" result="glow-color" />
      <feComposite in="glow-color" in2="blur" operator="in" result="glow-blur" />
      <feMerge>
        <feMergeNode in="glow-blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Glow and Border Card -->
  <rect x="5" y="5" width="38" height="38" rx="12" fill="white" stroke="#10B981" stroke-width="3" filter="url(#glow)" />

  <!-- Brown Cross -->
  <path d="M22 14h4v20h-4z M17 19h14v4H17z" fill="#7A4F37" />
</svg>